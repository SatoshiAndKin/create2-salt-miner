name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - uses: actions/checkout@v4
        if: steps.release.outputs.pr
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.release.outputs.pr

      - name: Update lockfile
        if: steps.release.outputs.pr
        run: cargo generate-lockfile

      - name: Commit updated lockfile
        if: steps.release.outputs.pr
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git diff --cached --quiet || git commit -m "chore: update Cargo.lock for release"
          git push

  windows:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build custom cross image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag cross-custom-create-salt-miner:x86_64-pc-windows-gnu \
            --load \
            -f Dockerfile.cross .

      - name: Build Windows release
        run: |
          CROSS_CONTAINER_OPTS="--platform linux/amd64" \
          RUSTFLAGS="-C target-cpu=x86-64" \
          cross build --release --target x86_64-pc-windows-gnu

      - name: Upload Windows artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: target/x86_64-pc-windows-gnu/release/salty.exe
